<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <mask id="slashMask">
      <rect width="32" height="32" fill="white"/>
      <!-- Cut at 10 o'clock direction through the circle -->
      <line x1="7" y1="13.5" x2="19" y2="23.5" stroke="black" stroke-width="2.8"/>
      <!-- Symmetric opposite cut at 4 o'clock side of circle (parallel, on the other side) -->
      <line x1="9" y1="14.5" x2="21" y2="24.5" stroke="black" stroke-width="2.8"/>
    </mask>
  </defs>
  
  <rect width="100%" height="100%" fill="#1a1a1a" shape-rendering="crispEdges"/>
  <circle cx="16" cy="16" r="12.5" fill="#A06CD5"/>
  
  <!-- Straight vertical line on the right (stem/ascender of 'd') -->
  <rect x="18" y="6" width="3" height="20" rx="0.5" fill="white"/>
  
  <!-- Circle bowl of 'd' with two symmetric diagonal cuts -->
  <circle cx="14" cy="19" r="6.5" fill="none" stroke="white" stroke-width="3" mask="url(#slashMask)"/>
</svg>
