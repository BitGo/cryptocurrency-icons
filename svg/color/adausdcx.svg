<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="100%" height="100%" fill="#1a1a1a" shape-rendering="crispEdges"/>
  <circle cx="16" cy="16" r="16" fill="#2775CA"/>
  <!-- Outer white ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Inner ring with gaps (parentheses style) -->
  <path d="M10.5 10 A8.5 8.5 0 0 1 21.5 10" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M21.5 22 A8.5 8.5 0 0 1 10.5 22" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Dollar sign -->
  <text x="16" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="12" fill="white">$</text>
</svg>
